<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C34B32"/>
      <stop offset="100%" style="stop-color:#9E3825"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4AA4A"/>
      <stop offset="100%" style="stop-color:#C98A2F"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Motif géométrique subtil (zellige) -->
  <g opacity="0.1" fill="white">
    <polygon points="256,60 296,100 256,140 216,100"/>
    <polygon points="100,200 140,240 100,280 60,240"/>
    <polygon points="412,200 452,240 412,280 372,240"/>
    <polygon points="256,370 296,410 256,450 216,410"/>
  </g>

  <!-- Corps du chat (silhouette géométrique) -->
  <!-- Oreilles -->
  <polygon points="168,210 148,155 210,178" fill="white"/>
  <polygon points="344,210 364,155 302,178" fill="white"/>
  <!-- Oreilles intérieures -->
  <polygon points="172,205 158,170 200,185" fill="url(#accent)" opacity="0.6"/>
  <polygon points="340,205 354,170 312,185" fill="url(#accent)" opacity="0.6"/>

  <!-- Tête -->
  <ellipse cx="256" cy="255" rx="108" ry="100" fill="white"/>

  <!-- Yeux -->
  <ellipse cx="218" cy="238" rx="16" ry="18" fill="#1B2D4A"/>
  <ellipse cx="294" cy="238" rx="16" ry="18" fill="#1B2D4A"/>
  <!-- Reflets yeux -->
  <circle cx="224" cy="232" r="5" fill="white"/>
  <circle cx="300" cy="232" r="5" fill="white"/>

  <!-- Nez -->
  <polygon points="256,264 246,278 266,278" fill="#C98A2F"/>

  <!-- Moustaches -->
  <line x1="180" y1="270" x2="240" y2="278" stroke="#1B2D4A" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="180" y1="282" x2="240" y2="284" stroke="#1B2D4A" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="272" y1="278" x2="332" y2="270" stroke="#1B2D4A" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="272" y1="284" x2="332" y2="282" stroke="#1B2D4A" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Corps -->
  <ellipse cx="256" cy="370" rx="88" ry="72" fill="white"/>

  <!-- Patte avant gauche -->
  <ellipse cx="200" cy="418" rx="26" ry="18" fill="white"/>
  <!-- Patte avant droite -->
  <ellipse cx="312" cy="418" rx="26" ry="18" fill="white"/>

  <!-- Point doré décoratif -->
  <circle cx="256" cy="460" r="8" fill="url(#accent)"/>
</svg>
